<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
<title>D.C. real GDP by McDuffie margin</title>
<desc>Forecast p50 values plotted from McDuffie margin -20 to +20, split at the zero-margin cutoff.</desc>
